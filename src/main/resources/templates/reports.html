<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генерація звітів</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .report-table th {
            background-color: #f8f9fa;
            vertical-align: middle;
        }
        .report-table td {
            vertical-align: top;
            white-space: pre-wrap;
        }
        .division-header {
            background-color: #e9ecef !important;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">Адмін</a>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/admin/dashboard}" class="text-light text-decoration-none">Назад до панелі</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <h2 class="mb-4">Звіти про підвищення кваліфікації</h2>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form id="reportForm" onsubmit="return false;">
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Рівень звіту</label>
                        <select class="form-select" name="level" id="levelSelect" onchange="toggleSelectors()">
                            <option value="UNIVERSITY">По університету</option>
                            <option value="FACULTY">По факультету</option>
                            <option value="DEPARTMENT">По кафедрі</option>
                            <option value="LECTURER">По конкретному викладачу</option>
                        </select>
                    </div>
                    
                    <div class="col-md-3 d-none" id="facultyContainer">
                        <label class="form-label fw-bold">Факультет</label>
                        <select class="form-select" name="facultyId" id="facultySelect" onchange="filterDepartments()">
                            <option value="">-- Оберіть факультет --</option>
                            <option th:each="f : ${faculties}" th:value="${f.facultyId}" th:text="${f.facultyName}"></option>
                        </select>
                    </div>
                    
                    <div class="col-md-3 d-none" id="departmentContainer">
                        <label class="form-label fw-bold">Кафедра</label>
                        <select class="form-select" name="departmentId" id="departmentSelect" onchange="filterLecturers()">
                            <option value="">-- Оберіть кафедру --</option>
                            <option th:each="d : ${departments}" 
                                    th:value="${d.departmentId}" 
                                    th:data-faculty-id="${d.facultyEntity != null ? d.facultyEntity.facultyId : ''}"
                                    th:text="${d.departmentName}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3 d-none" id="lecturerContainer">
                        <label class="form-label fw-bold">Викладач</label>
                        <select class="form-select" name="lecturerId" id="lecturerSelect">
                            <option value="">-- Оберіть викладача --</option>
                            <option th:each="l : ${lecturers}" 
                                    th:value="${l.lectureId}" 
                                    th:data-department-id="${l.departmentEntity != null ? l.departmentEntity.departmentId : ''}"
                                    th:text="${l.lastName + ' ' + l.firstName + (l.middleName != null ? ' ' + l.middleName : '')}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Фільтр по дисципліні</label>
                        <select class="form-select" name="disciplineId" id="disciplineSelect">
                            <option value="">-- Усі дисципліни --</option>
                            <option th:each="disc : ${disciplines}" 
                                    th:value="${disc.disciplineId}" 
                                    th:text="${disc.disciplineName}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Рік з (включно)</label>
                        <input type="number" class="form-control" name="yearFrom" id="yearFrom" placeholder="Напр. 2020">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Рік по (включно)</label>
                        <input type="number" class="form-control" name="yearTo" id="yearTo" placeholder="Напр. 2024">
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="detailedModeCheck" name="detailedMode">
                            <label class="form-check-label" for="detailedModeCheck">
                                <strong>Деталізований режим:</strong> додати стовпець "Дисципліна" та розділити викладачів по дисциплінах.
                            </label>
                        </div>
                    </div>
                </div>
                
                <div id="validationError" class="alert alert-danger d-none"></div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-primary" onclick="loadReport()">
                        <i class="bi bi-table"></i> Переглянути таблицю
                    </button>
                    <button type="button" class="btn btn-outline-danger" onclick="downloadFile('pdf')">
                        <i class="bi bi-file-earmark-pdf"></i> Завантажити PDF
                    </button>
                    <button type="button" class="btn btn-outline-success" onclick="downloadFile('xlsx')">
                        <i class="bi bi-file-earmark-excel"></i> Завантажити XLSX
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Container for AJAX loaded table -->
    <div id="reportContainer">
        <!-- Rendered Fragment will be placed here -->
        <div th:fragment="reportTable" th:if="${reportData != null}">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="mb-3">Результати звіту</h5>
                    <div class="table-responsive">
                        <table class="table table-bordered report-table">
                            <thead>
                                <tr>
                                    <th th:style="${detailedMode} ? 'width: 12%' : 'width: 15%'">ПІБ</th>
                                    <th th:style="${detailedMode} ? 'width: 12%' : 'width: 15%'">Посада</th>
                                    <th th:style="${detailedMode} ? 'width: 22%' : 'width: 25%'">Освіта</th>
                                    <th th:style="${detailedMode} ? 'width: 14%' : 'width: 15%'">Академічна інформація</th>
                                    <th th:if="${detailedMode}" style="width: 15%">Дисципліна</th>
                                    <th th:style="${detailedMode} ? 'width: 25%' : 'width: 30%'">Підвищення кваліфікації</th>
                                </tr>
                            </thead>
                            <tbody>
                                <th:block th:if="${#lists.isEmpty(reportData)}">
                                    <tr>
                                        <td th:colspan="${detailedMode} ? 6 : 5" class="text-center text-muted py-4">Немає даних за обраними критеріями</td>
                                    </tr>
                                </th:block>
                                
                                <th:block th:unless="${#maps.isEmpty(groupedData)}">
                                    <th:block th:each="entry : ${groupedData}">
                                        <tr class="division-header">
                                            <td th:colspan="${detailedMode} ? 6 : 5" th:text="${'Підрозділ: ' + entry.key}"></td>
                                        </tr>
                                        <tr th:each="row : ${entry.value}">
                                            <td class="fw-bold" th:text="${row.fullName}"></td>
                                            <td th:text="${row.position}"></td>
                                            <td th:text="${row.educationDetails}"></td>
                                            <td th:text="${row.academicInfo}"></td>
                                            <td th:if="${detailedMode}" th:text="${row.disciplineDetails}"></td>
                                            <td th:text="${row.upskillingDetails}"></td>
                                        </tr>
                                    </th:block>
                                </th:block>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        // Initialize filters on load
        filterDepartments();
    });

    function toggleSelectors() {
        const level = document.getElementById('levelSelect').value;
        const facContainer = document.getElementById('facultyContainer');
        const depContainer = document.getElementById('departmentContainer');
        const lectContainer = document.getElementById('lecturerContainer');
        
        facContainer.classList.add('d-none');
        depContainer.classList.add('d-none');
        lectContainer.classList.add('d-none');

        if (level === 'FACULTY') {
            facContainer.classList.remove('d-none');
        } else if (level === 'DEPARTMENT') {
            facContainer.classList.remove('d-none');
            depContainer.classList.remove('d-none');
            filterDepartments(); // apply faculty filter to departments
        } else if (level === 'LECTURER') {
            facContainer.classList.remove('d-none');
            depContainer.classList.remove('d-none');
            lectContainer.classList.remove('d-none');
            filterDepartments();
            filterLecturers();
        }
    }

    function filterDepartments() {
        const facultyId = document.getElementById('facultySelect').value;
        const depSelect = document.getElementById('departmentSelect');
        const options = depSelect.options;

        let hasVisible = false;
        for (let i = 1; i < options.length; i++) { // skip option[0] which is empty
            const opt = options[i];
            const optFacId = opt.getAttribute('data-faculty-id');
            if (!facultyId || optFacId === facultyId) {
                opt.style.display = '';
                hasVisible = true;
            } else {
                opt.style.display = 'none';
            }
        }
        
        // Always reset selection when filtering
        depSelect.value = '';
        filterLecturers();
    }

    function filterLecturers() {
        const departmentId = document.getElementById('departmentSelect').value;
        const lectSelect = document.getElementById('lecturerSelect');
        if (!lectSelect) return;
        
        const options = lectSelect.options;

        let hasVisible = false;
        for (let i = 1; i < options.length; i++) {
            const opt = options[i];
            const optDepId = opt.getAttribute('data-department-id');
            if (!departmentId || optDepId === departmentId) {
                opt.style.display = '';
                hasVisible = true;
            } else {
                opt.style.display = 'none';
            }
        }
        
        lectSelect.value = '';
    }

    function validateDates() {
        const yFrom = document.getElementById('yearFrom').value;
        const yTo = document.getElementById('yearTo').value;
        const errAlert = document.getElementById('validationError');
        
        if (yFrom && yTo) {
            if (parseInt(yFrom) > parseInt(yTo)) {
                errAlert.textContent = "Рік 'з' не може бути більшим за рік 'по'.";
                errAlert.classList.remove('d-none');
                return false;
            }
        }
        errAlert.classList.add('d-none');
        return true;
    }

    function buildQueryString() {
        const level = document.getElementById('levelSelect').value;
        const facultyId = document.getElementById('facultySelect').value;
        const departmentId = document.getElementById('departmentSelect').value;
        const lecturerId = document.getElementById('lecturerSelect') ? document.getElementById('lecturerSelect').value : '';
        const disciplineId = document.getElementById('disciplineSelect').value;
        const yearFrom = document.getElementById('yearFrom').value;
        const yearTo = document.getElementById('yearTo').value;
        const detailedMode = document.getElementById('detailedModeCheck').checked;
        
        let qs = `?level=${level}`;
        if ((level === 'FACULTY' || level === 'DEPARTMENT' || level === 'LECTURER') && facultyId) qs += `&facultyId=${facultyId}`;
        if ((level === 'DEPARTMENT' || level === 'LECTURER') && departmentId) qs += `&departmentId=${departmentId}`;
        if (level === 'LECTURER' && lecturerId) qs += `&lecturerId=${lecturerId}`;
        if (disciplineId) qs += `&disciplineId=${disciplineId}`;
        if (yearFrom) qs += `&yearFrom=${yearFrom}`;
        if (yearTo) qs += `&yearTo=${yearTo}`;
        if (detailedMode) qs += `&detailedMode=true`;
        
        return qs;
    }

    function loadReport() {
        if (!validateDates()) return;
        
        const qs = buildQueryString();
        const container = document.getElementById('reportContainer');
        container.innerHTML = '<div class="text-center my-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">Завантаження...</p></div>';
        
        fetch(`/admin/reports/view${qs}`)
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
            })
            .catch(err => {
                container.innerHTML = `<div class="alert alert-danger">Помилка завантаження звіту: ${err}</div>`;
            });
    }

    function downloadFile(type) {
        if (!validateDates()) return;
        const qs = buildQueryString();
        window.location.href = `/admin/reports/${type}${qs}`;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - QualiTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center py-4" style="height: 100vh;">

<main class="form-signin w-100 m-auto" style="max-width: 400px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h1 class="h3 mb-3 fw-normal">Система обліку</h1>
                <p class="text-muted">Підвищення кваліфікації викладачів</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
                Неправильна електронна пошта або пароль.
            </div>

            <div th:if="${param.logout}" class="alert alert-success text-center" role="alert">
                Ви вийшли з системи.
            </div>

            <div th:if="${success}" class="alert alert-success text-center" role="alert">
                <span th:text="${success}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="username" name="username" required autofocus placeholder="name@example.com">
                    <label for="username">Електронна пошта</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Password">
                    <label for="password">Пароль</label>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary py-2">Увійти</button>
                </div>
            </form>

        </div>
    </div>
</main>

</body>
</html>

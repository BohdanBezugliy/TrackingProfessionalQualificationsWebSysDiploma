<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль викладача</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">QualiTrack | Адмін</a>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/admin/dashboard}" class="text-light text-decoration-none">Назад до панелі</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <h2 class="h4 mb-0" th:text="${'Профіль викладача: ' + lecturer.lastName + ' ' + lecturer.firstName}"></h2>
        <form th:action="@{/admin/lecturer/{id}/delete(id=${lecturer.lectureId})}" method="post" class="mb-0">
            <button type="submit" class="btn btn-danger w-100" onclick="return confirm('Ви впевнені, що хочете видалити цього викладача?');">Видалити викладача</button>
        </form>
    </div>

    <div class="row">
        <!-- Основна інформація -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Основні дані</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/lecturer/{id}/profile/update(id=${lecturer.lectureId})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Прізвище <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="lastName" th:value="${lecturer.lastName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ім'я <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="firstName" th:value="${lecturer.firstName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">По батькові</label>
                            <input type="text" class="form-control" name="middleName" th:value="${lecturer.middleName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Кафедра</label>
                            <select class="form-select" name="departmentId" required>
                                <option th:each="dep : ${departments}" th:value="${dep.departmentId}" th:text="${dep.departmentName}" th:selected="${dep.departmentId == lecturer.departmentEntity.departmentId}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Науковий ступінь</label>
                            <input type="text" class="form-control" name="academicDegree" th:value="${lecturer.academicDegree}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Вчене звання</label>
                            <input type="text" class="form-control" name="academicRank" th:value="${lecturer.academicRank}">
                        </div>
                        <button type="submit" class="btn btn-primary">Зберегти зміни</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Зміна паролю -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Зміна паролю</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/lecturer/{id}/profile/password(id=${lecturer.lectureId})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Новий пароль <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="newPassword" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-warning">Змінити пароль</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

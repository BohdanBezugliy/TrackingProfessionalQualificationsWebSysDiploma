<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Довідник дисциплін - QualiTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">Адмін</a>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/admin/dashboard}" class="text-light text-decoration-none">Назад до панелі</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <h2 class="h4 mb-0">Довідник дисциплін</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createDisciplineModal">+ Додати дисципліну</button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between align-items-center" th:each="disc : ${disciplines}">
                    <div>
                        <span th:text="${disc.disciplineName}" class="fw-bold">Дисципліна</span>
                        <span class="badge bg-secondary ms-2" th:text="${disc.upskillEventsCount} + ' пов\'язаних документів'">0 пов'язаних документів</span>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" th:data-bs-target="'#editDisciplineModal' + ${disc.disciplineId}">Редагувати</button>
                        <form th:action="@{/admin/disciplines/delete/{id}(id=${disc.disciplineId})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger" 
                                    th:disabled="${disc.upskillEventsCount > 0}"
                                    onclick="return confirm('Ви впевнені?');">Видалити</button>
                        </form>
                    </div>

                    <!-- Модальне вікно редагування дисципліни -->
                    <div class="modal fade" th:id="'editDisciplineModal' + ${disc.disciplineId}" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <form th:action="@{/admin/disciplines/update/{id}(id=${disc.disciplineId})}" method="post">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Редагування дисципліни</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
                                    </div>
                                    <div class="modal-body">
                                        <div class="mb-3">
                                            <label class="form-label">Назва дисципліни <span class="text-danger">*</span></label>
                                            <input type="text" class="form-control" name="disciplineName" th:value="${disc.disciplineName}" required>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                                        <button type="submit" class="btn btn-primary">Зберегти</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                </li>
                <li class="list-group-item text-muted text-center" th:if="${#lists.isEmpty(disciplines)}">Немає дисциплін у довіднику</li>
            </ul>
        </div>
    </div>

</div>

<!-- Модальне вікно: Створення дисципліни -->
<div class="modal fade" id="createDisciplineModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/disciplines/create}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Нова дисципліна</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Назва дисципліни <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="disciplineName" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                    <button type="submit" class="btn btn-primary">Зберегти</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

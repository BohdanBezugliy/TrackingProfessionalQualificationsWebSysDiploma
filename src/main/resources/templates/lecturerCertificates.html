<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сертифікати викладача</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">QualiTrack | Адмін</a>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/admin/dashboard}" class="text-light text-decoration-none">Назад до панелі</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0" th:text="${'Сертифікати викладача: ' + lecturer.lastName + ' ' + lecturer.firstName}"></h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">+ Додати сертифікат</button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-4">Заклад</th>
                        <th>Тема</th>
                        <th>Дата отримання</th>
                        <th>Кредити ECTS / Години</th>
                        <th>Період навчання</th>
                        <th class="text-end px-4">Дії</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="event : ${events}">
                        <td class="px-4 fw-bold" th:text="${event.institutionName}"></td>
                        <td th:text="${event.topic}"></td>
                        <td th:text="${event.dateReceived}"></td>
                        <td th:text="${event.ectsCredits + ' / ' + event.hours}"></td>
                        <td th:text="${event.dateBegin + ' - ' + event.dateEnd}"></td>
                        <td class="text-end px-4">
                            <!-- TODO: Додати завантаження файлу якщо потрібно, наразі лише видалення -->
                            <form th:action="@{/admin/lecturer/{id}/certificates/delete/{eventId}(id=${lecturer.lectureId}, eventId=${event.upskillEventId})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Видалити сертифікат?');">Видалити</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(events)}">
                        <td colspan="6" class="text-center text-muted py-4">Немає сертифікатів</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Модальне вікно: Завантаження сертифікату -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/lecturer/{id}/certificates/upload(id=${lecturer.lectureId})}" method="post" enctype="multipart/form-data">
                <div class="modal-header">
                    <h5 class="modal-title">Додавання сертифікату</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Заклад (Установа) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="institutionName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Тема підвищення кваліфікації <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="topic" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Кількість кредитів ECTS</label>
                            <input type="number" step="0.1" class="form-control" name="ectsCredits" value="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Кількість годин</label>
                            <input type="number" class="form-control" name="hours" value="0">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Дата початку <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="dateBegin" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Дата завершення <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="dateEnd" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дата отримання <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" name="dateReceived" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Файл сертифікату <span class="text-danger">*</span> <br><small class="text-muted">(До 4MB. Дозволено: PDF, DOC, DOCX, JPEG, PNG)</small></label>
                        <input type="file" class="form-control" name="file" accept=".pdf,.doc,.docx,.jpeg,.jpg,.png" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                    <button type="submit" class="btn btn-primary">Завантажити</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документи про підвищення кваліфікації</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">QualiTrack | Адмін</a>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/admin/dashboard}" class="text-light text-decoration-none">Назад до панелі</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <h2 class="h4 mb-0" th:text="${'Документи про підвищення кваліфікації: ' + lecturer.lastName + ' ' + lecturer.firstName}"></h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">+ Додати подію підвищення кваліфікації</button>
    </div>

    <div class="accordion" id="disciplinesAccordion">
        <div class="accordion-item mb-3 border rounded shadow-sm" th:each="discEntry, dStat : ${groupedEvents}">
            <h2 class="accordion-header" th:id="'headingDisc' + ${dStat.index}">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" 
                        th:data-bs-target="'#collapseDisc' + ${dStat.index}" 
                        th:aria-expanded="${dStat.index == 0 ? 'true' : 'false'}" 
                        th:aria-controls="'collapseDisc' + ${dStat.index}">
                    <strong th:text="${discEntry.key.disciplineName}"></strong>
                </button>
            </h2>
            <div th:id="'collapseDisc' + ${dStat.index}" 
                 class="accordion-collapse collapse" th:classappend="${dStat.index == 0 ? 'show' : ''}" 
                 th:aria-labelledby="'headingDisc' + ${dStat.index}" 
                 data-bs-parent="#disciplinesAccordion">
                <div class="accordion-body p-0">
                    
                    <!-- Sub-accordion for Years -->
                    <div class="accordion accordion-flush" th:id="'yearsAccordion' + ${dStat.index}">
                        <div class="accordion-item" th:each="yearEntry, yStat : ${discEntry.value}">
                            <h2 class="accordion-header" th:id="'headingYear' + ${dStat.index} + '_' + ${yStat.index}">
                                <button class="accordion-button collapsed bg-light border-bottom" type="button" data-bs-toggle="collapse"
                                        th:data-bs-target="'#collapseYear' + ${dStat.index} + '_' + ${yStat.index}"
                                        aria-expanded="false" 
                                        th:aria-controls="'collapseYear' + ${dStat.index} + '_' + ${yStat.index}">
                                    <span class="fw-bold me-3" th:text="${yearEntry.key} + ' рік'"></span>
                                    <span class="badge bg-secondary me-2" th:text="'ЄКТС: ' + ${yearEntry.value.totalEcts}"></span>
                                    <span class="badge bg-info text-dark" th:text="'Години: ' + ${yearEntry.value.totalHours}"></span>
                                </button>
                            </h2>
                            <div th:id="'collapseYear' + ${dStat.index} + '_' + ${yStat.index}" 
                                 class="accordion-collapse collapse" 
                                 th:aria-labelledby="'headingYear' + ${dStat.index} + '_' + ${yStat.index}"
                                 th:data-bs-parent="'#yearsAccordion' + ${dStat.index}">
                                <div class="accordion-body">
                                    <div class="list-group list-group-flush">
                                        <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" 
                                           th:each="evt : ${yearEntry.value.events}"
                                           th:data-id="${evt.upskillEventId}"
                                           th:data-type="${evt.documentEntity.documentType}"
                                           th:data-number="${evt.documentNumber}"
                                           th:data-institution="${evt.institutionName}"
                                           th:data-topic="${evt.topic}"
                                           th:data-datereceived="${evt.dateReceived}"
                                           th:data-datebegin="${evt.dateBegin}"
                                           th:data-dateend="${evt.dateEnd}"
                                           th:data-ects="${evt.ectsCredits}"
                                           th:data-hours="${evt.hours}"
                                           th:data-disciplines="${#strings.listJoin(evt.disciplines.![disciplineId], ',')}"
                                           onclick="openCertificateDetails(this); return false;">
                                            <div>
                                                <div class="fw-bold text-primary" th:text="${evt.topic}"></div>
                                                <small class="text-muted" th:text="${evt.institutionName + ' | ' + evt.dateBegin + ' - ' + evt.dateEnd}"></small>
                                            </div>
                                            <span class="badge bg-primary rounded-pill" th:text="${evt.documentEntity.documentType}"></span>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${#maps.isEmpty(groupedEvents)}" class="alert alert-info text-center">
            Немає сертифікатів або вони не прив'язані до дисциплін.
        </div>
    </div>
</div>

<!-- Модальне вікно: Завантаження сертифікату -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="addDocumentForm" th:action="@{/admin/lecturer/{id}/certificates/upload(id=${lecturer.lectureId})}" method="post" enctype="multipart/form-data">
                <div class="modal-header">
                    <h5 class="modal-title">Додавання події підвищення кваліфікації</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Тип документа <span class="text-danger">*</span></label>
                        <select class="form-select" name="documentType" required>
                            <option value="">Оберіть тип...</option>
                            <option value="Сертифікат">Сертифікат</option>
                            <option value="Свідоцтво">Свідоцтво</option>
                            <option value="Посвідчення">Посвідчення</option>
                            <option value="Диплом">Диплом</option>
                            <option value="Довідка">Довідка</option>
                            <option value="Акт">Акт</option>
                            <option value="Наказ (витяг з наказу)">Наказ (витяг з наказу)</option>
                            <option value="Витяг з протоколу">Витяг з протоколу</option>
                            <option value="Звіт">Звіт</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Обліковий номер або серія та номер <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="documentNumber" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Повне найменування суб'єкта підвищення кваліфікації (Заклад / ФОП) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="institutionName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Тема, напрям або найменування програми підвищення кваліфікації <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="topic" required></textarea>
                    </div>
                    <div class="mb-3 p-3 bg-light border rounded">
                        <label class="form-label fw-bold d-block">Оберіть одиницю виміру обсягу <span class="text-danger">*</span></label>
                        <div class="form-check form-check-inline mb-3">
                            <input class="form-check-input" type="radio" name="volumeType" id="typeEcts" value="ects" checked>
                            <label class="form-check-label" for="typeEcts">Кредити ЄКТС</label>
                        </div>
                        <div class="form-check form-check-inline mb-3">
                            <input class="form-check-input" type="radio" name="volumeType" id="typeHours" value="hours">
                            <label class="form-check-label" for="typeHours">Години</label>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Кількість кредитів ЄКТС</label>
                                <input type="number" step="0.1" class="form-control" name="ectsCredits" id="inputEcts" value="0">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Кількість годин</label>
                                <input type="number" class="form-control" name="hours" id="inputHours" value="0" disabled>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Дата початку <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="dateBegin" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Дата завершення <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="dateEnd" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дата видачі документа <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" name="dateReceived" required th:max="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                    </div>

                    <!-- Динамічний блок для дисциплін -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Дисципліни <span class="text-danger">*</span></label>
                        <div id="disciplinesContainer">
                            <div class="row discipline-item mb-2 align-items-end">
                                <div class="col-md-10">
                                    <select class="form-select" name="disciplineIds" required>
                                        <option value="">Оберіть дисципліну...</option>
                                        <option th:each="d : ${allDisciplines}" th:value="${d.disciplineId}" th:text="${d.disciplineName}"></option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-outline-danger remove-discipline-btn w-100" style="display: none;">X</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-2" id="addDisciplineBtn">+ Додати ще дисципліну</button>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Файл сертифікату <span class="text-danger">*</span> <br><small class="text-muted">(До 4MB. Дозволено: PDF, DOC, DOCX, JPEG, PNG)</small></label>
                        <input type="file" class="form-control" name="file" accept=".pdf,.doc,.docx,.jpeg,.jpg,.png" required>
                    </div>
                </div>
                
                <div class="alert alert-danger d-none mx-3 mb-3" id="formErrorAlert"></div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                    <button type="submit" class="btn btn-primary">Завантажити</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Модальне вікно: Деталі/Редагування сертифікату -->
<div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Деталі сертифікату</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
            </div>
            <!-- Update Form -->
            <form id="editDocumentForm" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="modal-body">
                    <div id="editFormErrorAlert" class="alert alert-danger d-none mb-3"></div>
                    <div class="mb-3">
                        <label class="form-label">Тип документа <span class="text-danger">*</span></label>
                        <select class="form-select" name="documentType" id="editDocType" required>
                            <option value="Сертифікат">Сертифікат</option>
                            <option value="Свідоцтво">Свідоцтво</option>
                            <option value="Посвідчення">Посвідчення</option>
                            <option value="Диплом">Диплом</option>
                            <option value="Довідка">Довідка</option>
                            <option value="Акт">Акт</option>
                            <option value="Наказ (витяг з наказу)">Наказ (витяг з наказу)</option>
                            <option value="Витяг з протоколу">Витяг з протоколу</option>
                            <option value="Звіт">Звіт</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Номер <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="documentNumber" id="editDocNumber" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Заклад <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="institutionName" id="editInstitution" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Тема <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="topic" id="editTopic" required></textarea>
                    </div>
                    <div class="mb-3 p-3 bg-light border rounded">
                        <label class="form-label fw-bold d-block">Оберіть одиницю виміру обсягу <span class="text-danger">*</span></label>
                        <div class="form-check form-check-inline mb-3">
                            <input class="form-check-input" type="radio" name="editVolumeType" id="editTypeEcts" value="ects" checked>
                            <label class="form-check-label" for="editTypeEcts">Кредити ЄКТС</label>
                        </div>
                        <div class="form-check form-check-inline mb-3">
                            <input class="form-check-input" type="radio" name="editVolumeType" id="editTypeHours" value="hours">
                            <label class="form-check-label" for="editTypeHours">Години</label>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Кількість кредитів ЄКТС</label>
                                <input type="number" step="0.1" class="form-control" name="ectsCredits" id="editEcts">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label">Кількість годин</label>
                                <input type="number" class="form-control" name="hours" id="editHours">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Початок <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="dateBegin" id="editDateBegin" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Завершення <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="dateEnd" id="editDateEnd" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Отримання <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="dateReceived" id="editDateReceived" required th:max="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Новий файл сертифікату <br><small class="text-muted">(Залиште порожнім, щоб не змінювати файл)</small></label>
                        <input type="file" class="form-control" name="file" accept=".pdf,.doc,.docx,.jpeg,.jpg,.png">
                    </div>
                    <a id="downloadBtn" href="#" class="btn btn-sm btn-outline-success mb-3 w-100">Завантажити поточний документ</a>
                </div>
                <div class="alert alert-danger d-none mx-3 mb-3" id="editFormErrorAlert"></div>
                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" class="btn btn-danger" onclick="document.getElementById('deleteDocumentForm').submit();">Видалити</button>
                    <div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
                        <button type="submit" class="btn btn-primary">Зберегти зміни</button>
                    </div>
                </div>
            </form>
            
            <!-- Hidden delete form -->
            <form id="deleteDocumentForm" method="post" style="display: none;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openCertificateDetails(element) {
        const id = element.getAttribute("data-id");
        document.getElementById("editDocType").value = element.getAttribute("data-type");
        document.getElementById("editDocNumber").value = element.getAttribute("data-number");
        document.getElementById("editInstitution").value = element.getAttribute("data-institution");
        document.getElementById("editTopic").value = element.getAttribute("data-topic");
        document.getElementById("editDateReceived").value = element.getAttribute("data-datereceived");
        document.getElementById("editDateBegin").value = element.getAttribute("data-datebegin");
        document.getElementById("editDateEnd").value = element.getAttribute("data-dateend");
        document.getElementById("editEcts").value = element.getAttribute("data-ects") || "";
        document.getElementById("editHours").value = element.getAttribute("data-hours") || "";
        
        if (element.getAttribute("data-ects") > 0) {
            document.getElementById("editTypeEcts").checked = true;
            document.getElementById("editEcts").disabled = false;
            document.getElementById("editHours").disabled = true;
        } else if (element.getAttribute("data-hours") > 0) {
            document.getElementById("editTypeHours").checked = true;
            document.getElementById("editHours").disabled = false;
            document.getElementById("editEcts").disabled = true;
        } else {
            document.getElementById("editTypeEcts").checked = true;
            document.getElementById("editEcts").disabled = false;
            document.getElementById("editHours").disabled = true;
        }
        
        const lecturerId = [[${lecturer.lectureId}]];
        document.getElementById("editDocumentForm").action = `/admin/lecturer/${lecturerId}/certificates/update/${id}`;
        document.getElementById("deleteDocumentForm").action = `/admin/lecturer/${lecturerId}/certificates/delete/${id}`;
        document.getElementById("downloadBtn").href = `/admin/lecturer/${lecturerId}/certificates/download/${id}`;
        
        new bootstrap.Modal(document.getElementById('detailsModal')).show();
    }

    document.addEventListener("DOMContentLoaded", function() {
        const container = document.getElementById("disciplinesContainer");
        const addBtn = document.getElementById("addDisciplineBtn");
        
        addBtn.addEventListener("click", function() {
            const firstItem = container.querySelector(".discipline-item");
            const newItem = firstItem.cloneNode(true);
            
            // Clear selected value
            newItem.querySelector("select").value = "";
            
            // Show remove button
            newItem.querySelector(".remove-discipline-btn").style.display = "block";
            
            // Add remove event
            newItem.querySelector(".remove-discipline-btn").addEventListener("click", function() {
                container.removeChild(newItem);
                updateRemoveButtons();
            });
            
            container.appendChild(newItem);
            updateRemoveButtons();
        });
        
        function updateRemoveButtons() {
            const items = container.querySelectorAll(".discipline-item");
            if (items.length > 1) {
                items[0].querySelector(".remove-discipline-btn").style.display = "block";
            } else {
                items[0].querySelector(".remove-discipline-btn").style.display = "none";
            }
        }
        
        // Setup initial remove button
        const firstRemoveBtn = container.querySelector(".remove-discipline-btn");
        firstRemoveBtn.addEventListener("click", function() {
            if (container.querySelectorAll(".discipline-item").length > 1) {
                container.removeChild(this.closest(".discipline-item"));
                updateRemoveButtons();
            }
        });
        
        // FORM VALIDATION LOGIC
        const form = document.getElementById("addDocumentForm");
        const errorAlert = document.getElementById("formErrorAlert");
        
        const typeEcts = document.getElementById("typeEcts");
        const typeHours = document.getElementById("typeHours");
        const inputEcts = document.getElementById("inputEcts");
        const inputHours = document.getElementById("inputHours");

        function toggleInputs() {
            if (typeEcts.checked) {
                inputEcts.disabled = false;
                inputEcts.required = true;
                inputHours.disabled = true;
                inputHours.required = false;
                inputHours.value = "0";
            } else {
                inputEcts.disabled = true;
                inputEcts.required = false;
                inputEcts.value = "0";
                inputHours.disabled = false;
                inputHours.required = true;
            }
        }

        typeEcts.addEventListener("change", toggleInputs);
        typeHours.addEventListener("change", toggleInputs);
        toggleInputs();

        form.addEventListener("submit", function(e) {
            let errors = [];
            
            // 1. ECTS / Hours validation
            if (typeEcts.checked && parseFloat(inputEcts.value) <= 0) {
                errors.push("Кількість кредитів ЄКТС повинна бути більшою за 0.");
            }
            if (typeHours.checked && parseInt(inputHours.value) <= 0) {
                errors.push("Кількість академічних годин повинна бути більшою за 0.");
            }
            
            // 2. Dates validation
            const dateBegin = new Date(form.querySelector("[name='dateBegin']").value);
            const dateEnd = new Date(form.querySelector("[name='dateEnd']").value);
            const dateReceived = new Date(form.querySelector("[name='dateReceived']").value);
            const today = new Date();
            
            if (dateEnd < dateBegin) {
                errors.push("Дата завершення не може бути раніше за дату початку.");
            }
            if (dateReceived > today) {
                errors.push("Дата видачі документа не може бути в майбутньому.");
            }
            if (dateReceived < dateEnd) {
                errors.push("Дата видачі документа не може бути раніше дати завершення.");
            }
            
            // Hours vs Days validation (max 8h/day)
            if (!isNaN(dateBegin) && !isNaN(dateEnd) && dateEnd >= dateBegin) {
                const diffTime = Math.abs(dateEnd - dateBegin);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // inclusive
                const maxAllowedHours = diffDays * 8; 
                
                let inputTotalHours = 0;
                if (typeEcts.checked && !isNaN(parseFloat(inputEcts.value))) {
                    inputTotalHours = parseFloat(inputEcts.value) * 30;
                } else if (typeHours.checked && !isNaN(parseInt(inputHours.value))) {
                    inputTotalHours = parseInt(inputHours.value);
                }
                
                if (inputTotalHours > maxAllowedHours) {
                    errors.push(`Кількість годин (${inputTotalHours}) перевищує можливий максимум для вказаного періоду (${diffDays} дн. × 8 год. = ${maxAllowedHours} год.).`);
                }
            }
            
            // 3. Unique disciplines
            const selects = form.querySelectorAll("[name='disciplineIds']");
            let selectedVals = new Set();
            let duplicateFound = false;
            selects.forEach(select => {
                if (select.value) {
                    if (selectedVals.has(select.value)) {
                        duplicateFound = true;
                    }
                    selectedVals.add(select.value);
                }
            });
            if (duplicateFound) {
                errors.push("Не можна прив'язувати одну і ту ж дисципліну кілька разів.");
            }
            
            // File size (upload form)
            const fileInput = form.querySelector("[name='file']");
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 4 * 1024 * 1024) {
                    errors.push("Розмір файлу перевищує дозволені 4MB.");
                }
            }
            
            if (errors.length > 0) {
                e.preventDefault();
                errorAlert.innerHTML = errors.join("<br>");
                errorAlert.classList.remove("d-none");
                errorAlert.scrollIntoView({ behavior: 'smooth', block: 'end' });
            } else {
                errorAlert.classList.add("d-none");
            }
        });

        // Edit form radio logic
        const editTypeEcts = document.getElementById("editTypeEcts");
        const editTypeHours = document.getElementById("editTypeHours");
        const editInputEcts = document.getElementById("editEcts");
        const editInputHours = document.getElementById("editHours");

        if (editTypeEcts && editTypeHours) {
            editTypeEcts.addEventListener("change", function() {
                if(this.checked) {
                    editInputEcts.disabled = false;
                    editInputEcts.required = true;
                    editInputHours.disabled = true;
                    editInputHours.required = false;
                    editInputHours.value = "0";
                }
            });

            editTypeHours.addEventListener("change", function() {
                if(this.checked) {
                    editInputHours.disabled = false;
                    editInputHours.required = true;
                    editInputEcts.disabled = true;
                    editInputEcts.required = false;
                    editInputEcts.value = "0";
                }
            });
        }

        // Edit form validation
        const editForm = document.getElementById("editDocumentForm");
        const editErrorAlert = document.getElementById("editFormErrorAlert");
        
        if (editForm) {
            editForm.addEventListener("submit", function(e) {
                let errors = [];
                
                // 1. ECTS / Hours validation
                if (editTypeEcts.checked && parseFloat(editInputEcts.value) <= 0) {
                    errors.push("Кількість кредитів ЄКТС повинна бути більшою за 0.");
                }
                if (editTypeHours.checked && parseInt(editInputHours.value) <= 0) {
                    errors.push("Кількість академічних годин повинна бути більшою за 0.");
                }
                
                const dBegin = new Date(editForm.querySelector("[name='dateBegin']").value);
                const dEnd = new Date(editForm.querySelector("[name='dateEnd']").value);
                const dRec = new Date(editForm.querySelector("[name='dateReceived']").value);
                const today = new Date();
                
                if (dEnd < dBegin) errors.push("Дата завершення не може бути раніше за дату початку.");
                if (dRec > today) errors.push("Дата видачі документа не може бути в майбутньому.");
                if (dRec < dEnd) errors.push("Дата видачі документа не може бути раніше дати завершення.");
                
                if (!isNaN(dBegin) && !isNaN(dEnd) && dEnd >= dBegin) {
                    const diffDays = Math.ceil(Math.abs(dEnd - dBegin) / (1000 * 60 * 60 * 24)) + 1;
                    const maxAllowedHours = diffDays * 8; 
                    
                    let inputTotalHours = 0;
                    if (editTypeEcts.checked && !isNaN(parseFloat(editInputEcts.value))) {
                        inputTotalHours = parseFloat(editInputEcts.value) * 30;
                    } else if (editTypeHours.checked && !isNaN(parseInt(editInputHours.value))) {
                        inputTotalHours = parseInt(editInputHours.value);
                    }
                    
                    if (inputTotalHours > maxAllowedHours) {
                        errors.push(`Кількість годин (${inputTotalHours}) перевищує можливий максимум (${maxAllowedHours} год.).`);
                    }
                }
                
                const fInput = editForm.querySelector("[name='file']");
                if (fInput.files.length > 0 && fInput.files[0].size > 4 * 1024 * 1024) {
                    errors.push("Розмір файлу перевищує дозволені 4MB.");
                }
                
                if (errors.length > 0) {
                    e.preventDefault();
                    editErrorAlert.innerHTML = errors.join("<br>");
                    editErrorAlert.classList.remove("d-none");
                    editErrorAlert.scrollIntoView({ behavior: 'smooth', block: 'end' });
                } else {
                    editErrorAlert.classList.add("d-none");
                }
            });
        }
    });
</script>
</body>
</html>

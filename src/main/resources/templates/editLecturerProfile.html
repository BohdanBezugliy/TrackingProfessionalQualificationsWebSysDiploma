<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редагування профілю викладача</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">Адмін</a>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/admin/dashboard}" class="text-light text-decoration-none">Назад до панелі</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0" th:text="${'Редагування профілю: ' + lecturer.lastName + ' ' + lecturer.firstName}"></h2>
        <a th:href="@{/admin/lecturer/{id}/profile(id=${lecturer.lectureId})}" class="btn btn-outline-secondary">Скасувати</a>
    </div>
    <div class="alert alert-danger d-none mb-4" id="profileErrorAlert"></div>

    <form id="editProfileForm" th:action="@{/admin/lecturer/{id}/profile/update(id=${lecturer.lectureId})}" method="post">
        
        <div class="row">
            <!-- Основна інформація -->
            <div class="col-lg-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Основні дані</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Прізвище <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="lastName" th:value="${lecturer.lastName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ім'я <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="firstName" th:value="${lecturer.firstName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">По батькові</label>
                            <input type="text" class="form-control" name="middleName" th:value="${lecturer.middleName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" name="email" th:value="${lecturer.email}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Дата початку роботи <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="hireDate" th:value="${lecturer.hireDate}" required th:max="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Кафедра <span class="text-danger">*</span></label>
                            <select class="form-select" name="departmentId" required>
                                <option th:each="dep : ${departments}" th:value="${dep.departmentId}" th:text="${dep.departmentName + ' (' + dep.facultyName + ')'}" th:selected="${dep.departmentId == lecturer.departmentId}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Науковий ступінь</label>
                            <input type="text" class="form-control" name="academicDegree" th:value="${lecturer.academicDegree}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Вчене звання</label>
                            <input type="text" class="form-control" name="academicRank" th:value="${lecturer.academicRank}">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Освіта -->
            <div class="col-lg-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Освіта</h5>
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addEducationBtn">+ Додати заклад</button>
                    </div>
                    <div class="card-body bg-light" id="educationContainer">
                        
                        <!-- Існуючі записи -->
                        <div class="education-item bg-white p-3 border rounded mb-3" th:each="edu, iterStat : ${lecturer.educations}">
                            <div class="d-flex justify-content-end mb-2">
                                <button type="button" class="btn btn-sm btn-outline-danger remove-edu-btn">Видалити</button>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Назва закладу <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" th:name="'educations[' + ${iterStat.index} + '].institutionName'" th:value="${edu.institutionName}" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Спеціальність <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" th:name="'educations[' + ${iterStat.index} + '].specialization'" th:value="${edu.specialization}" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Дата завершення <span class="text-danger">*</span></label>
                                <input type="date" class="form-control form-control-sm" th:name="'educations[' + ${iterStat.index} + '].endingDate'" th:value="${edu.endingDate}" required th:max="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                            </div>
                        </div>

                        <!-- Шаблон порожнього запису якщо немає освіти -->
                        <div class="education-item bg-white p-3 border rounded mb-3" th:if="${lecturer.educations == null or lecturer.educations.isEmpty()}" id="emptyTemplate">
                            <div class="d-flex justify-content-end mb-2">
                                <button type="button" class="btn btn-sm btn-outline-danger remove-edu-btn" style="display:none;">Видалити</button>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Назва закладу <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" name="educations[0].institutionName">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Спеціальність <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" name="educations[0].specialization">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Дата завершення <span class="text-danger">*</span></label>
                                <input type="date" class="form-control form-control-sm" name="educations[0].endingDate" th:max="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <div class="text-end mb-4">
            <button type="submit" class="btn btn-primary btn-lg px-5">Зберегти зміни</button>
        </div>
    </form>

    <!-- Зміна паролю -->
    <div class="card shadow-sm mt-4 border-warning">
        <div class="card-header bg-white border-warning">
            <h5 class="mb-0 text-warning">Зміна паролю</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/lecturer/{id}/profile/password(id=${lecturer.lectureId})}" method="post" class="row align-items-end">
                <div class="col-md-6 mb-3 mb-md-0">
                    <label class="form-label">Новий пароль <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" name="newPassword" 
                           required 
                           pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d]{8,20}$"
                           title="Пароль має містити від 8 до 20 символів, щонайменше одну велику літеру, одну малу літеру та одну цифру.">
                    <div class="form-text text-muted" style="font-size: 0.8em;">
                        Від 8 до 20 символів. Мінімум 1 велика літера, 1 мала та 1 цифра.
                    </div>
                </div>
                <div class="col-md-6">
                    <button type="submit" class="btn btn-warning">Змінити пароль</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const eduContainer = document.getElementById('educationContainer');
        const addBtn = document.getElementById("addEducationBtn");
        const profileForm = document.getElementById('editProfileForm');
        const profileErrorAlert = document.getElementById('profileErrorAlert');
        
        if (profileForm) {
            profileForm.addEventListener('submit', function(e) {
                let errors = [];
                const hireDateStr = profileForm.querySelector('[name="hireDate"]').value;
                const today = new Date();
                const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                
                if (hireDateStr && hireDateStr > todayStr) {
                    errors.push("Дата початку роботи не може бути в майбутньому.");
                }
                
                const eduDates = profileForm.querySelectorAll('input[type="date"][name^="educations"]');
                eduDates.forEach(dateInput => {
                    if (dateInput.value && dateInput.value > todayStr) {
                        errors.push("Дата завершення освіти не може бути в майбутньому.");
                    }
                });
                
                if (errors.length > 0) {
                    e.preventDefault();
                    profileErrorAlert.innerHTML = Array.from(new Set(errors)).join("<br>");
                    profileErrorAlert.classList.remove("d-none");
                    profileErrorAlert.scrollIntoView({ behavior: 'smooth', block: 'end' });
                } else {
                    profileErrorAlert.classList.add("d-none");
                }
            });
        }
        
        let currentIndex = document.querySelectorAll('.education-item').length;

        // Template logic for empty initial state
        const emptyTemplate = document.getElementById('emptyTemplate');
        if (emptyTemplate) {
            // Remove required from empty template if it's the only one and empty
            const inputs = emptyTemplate.querySelectorAll('input');
            inputs.forEach(i => i.removeAttribute('required'));
            currentIndex = 1;
        }

        addBtn.addEventListener("click", function() {
            // Ensure first item becomes required if we start typing or add another
            if (emptyTemplate) {
                const inputs = emptyTemplate.querySelectorAll('input');
                inputs.forEach(i => i.setAttribute('required', 'required'));
                emptyTemplate.removeAttribute('id'); // no longer the empty template
            }

            const items = eduContainer.querySelectorAll(".education-item");
            const template = items[items.length - 1]; // clone last item
            const newItem = template.cloneNode(true);
            
            // Clear values and update indices
            const inputs = newItem.querySelectorAll("input");
            inputs.forEach(input => {
                input.value = "";
                input.setAttribute('required', 'required');
                const name = input.getAttribute("name");
                if (name) {
                    input.setAttribute("name", name.replace(/\[\d+\]/, '[' + currentIndex + ']'));
                }
            });
            
            // Show remove button
            const removeBtn = newItem.querySelector(".remove-edu-btn");
            if(removeBtn) removeBtn.style.display = "block";

            eduContainer.appendChild(newItem);
            currentIndex++;
            updateRemoveButtons();
        });
        
        function updateRemoveButtons() {
            const items = eduContainer.querySelectorAll(".education-item");
            items.forEach((item, index) => {
                const removeBtn = item.querySelector(".remove-edu-btn");
                if (removeBtn) {
                    removeBtn.style.display = "block";
                }
            });
        }

        // Event delegation for remove buttons
        eduContainer.addEventListener('click', function(e) {
            if (e.target && e.target.classList.contains('remove-edu-btn')) {
                const item = e.target.closest('.education-item');
                // if it's the last one, just clear the inputs instead of removing
                if (eduContainer.querySelectorAll('.education-item').length === 1) {
                    const inputs = item.querySelectorAll('input');
                    inputs.forEach(i => {
                        i.value = '';
                        i.removeAttribute('required');
                    });
                    e.target.style.display = 'none';
                    item.id = 'emptyTemplate';
                } else {
                    eduContainer.removeChild(item);
                }
            }
        });
    });
</script>
</body>
</html>

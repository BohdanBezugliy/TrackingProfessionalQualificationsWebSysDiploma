<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дисципліни викладача</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">QualiTrack | Адмін</a>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/admin/dashboard}" class="text-light text-decoration-none">Назад до панелі</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0" th:text="${'Дисципліни викладача: ' + lecturer.lastName + ' ' + lecturer.firstName}"></h2>
    </div>

    <div class="row">
        <!-- Список призначених дисциплін -->
        <div class="col-md-8 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Призначені дисципліни</h5>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="disc : ${lecturer.disciplines}">
                            <span th:text="${disc.disciplineName}">Назва</span>
                            <form th:action="@{/admin/lecturer/{id}/disciplines/remove(id=${lecturer.lectureId})}" method="post" class="mb-0">
                                <input type="hidden" name="disciplineId" th:value="${disc.disciplineId}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Вилучити</button>
                            </form>
                        </li>
                        <li class="list-group-item text-muted text-center" th:if="${#lists.isEmpty(lecturer.disciplines)}">Немає призначених дисциплін</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Додавання дисципліни -->
        <div class="col-md-4 mb-4">
            <!-- Призначити з довідника -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Призначити дисципліну</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/lecturer/{id}/disciplines/add(id=${lecturer.lectureId})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Оберіть з довідника</label>
                            <select class="form-select" name="disciplineId" required>
                                <option value="">Оберіть...</option>
                                <option th:each="d : ${allDisciplines}" th:value="${d.disciplineId}" th:text="${d.disciplineName}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Додати викладачу</button>
                    </form>
                </div>
            </div>

            <!-- Створити нову глобальну дисципліну -->
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Створити нову (в довідник)</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/lecturer/{id}/disciplines/create-global(id=${lecturer.lectureId})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Назва нової дисципліни</label>
                            <input type="text" class="form-control" name="disciplineName" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Створити та додати до довідника</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
